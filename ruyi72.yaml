# 复制为项目根目录 ruyi72.yaml，或 ~/.ruyi72/ruyi72.yaml
# 也可用环境变量 RUYI72_CONFIG 指向配置文件路径

version: 1

app:
  title: 如意72
  width: 960
  height: 640

llm:
  provider: ollama
  base_url: http://127.0.0.1:11434
  model: gnremy/qwen3.5-abliterated:35b-a3b
  temperature: 0.6
  max_tokens: 131072
  api_mode: openai
  api_key: "ollama-local-no-key-needed"
embedding:
  model: qwen3-embedding:8b
  base_url: ""   # 空则沿用 llm.base_url（Ollama）
memory:
  backend: dual   # jsonl | dual | sqlite；dual/sqlite 时启动会尝试从 *.jsonl 一次性导入 memory.db
  sqlite_path: "" # 空则为 %USERPROFILE%\.ruyi72\memory\memory.db
  vector_enabled: true   # true 且 llm.provider=ollama 时，important 事实写入后异步量化为向量
  messages_index_enabled: true  # true 时每次保存会话消息会重建该会话在 memory.db 的 FTS（供 search_history）
  extract_llm_timeout_sec: 600  # 主动/闲时记忆抽取的 LLM 读超时（秒，60～3600）；大模型或长粘贴可调高如 600
  extract_max_input_chars: 16000  # 单次抽取粘贴文本最大字符数；超出则拒绝（可分段提取或调大）
  extract_max_tokens: 40960      # 抽取专用生成 token 上限，与 llm.max_tokens 独立，减轻慢推理与超长 JSON
# 团队模式（可选）：按顺序对应 A1、A2…；至少 2 条才可创建团队会话；N ≤ min(4, 模型条数)。
# suitable_for 会作为系统提示词发给团队链路中的每一个模型，供委派决策参考。
# team:
#   models:
#     - model: "qwen2.5:7b"
#       suitable_for: "小模型、低延迟，适合理解与拆分需求"
#     - model: "qwen2.5-coder:32b"
#       suitable_for: "擅长代码与仓库内操作"
#     - model: "deepseek-r1:14b"
#       suitable_for: "擅长长链推理与归纳"
