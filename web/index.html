<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>如意72</title>
  <link rel="stylesheet" href="style.css" />
  <script>
    (function () {
      try {
        var k = "ruyi72_theme";
        var allowed = ["default", "emerald", "violet", "amber"];
        var v = localStorage.getItem(k);
        document.documentElement.setAttribute(
          "data-theme",
          allowed.indexOf(v) >= 0 ? v : "default"
        );
      } catch (e) {
        document.documentElement.setAttribute("data-theme", "default");
      }
    })();
  </script>
</head>
<body class="app">
  <aside class="sidebar">
    <div class="sidebar-head">
      <h2 class="sidebar-title">会话</h2>
      <div class="sidebar-head-actions">
        <button type="button" id="btn-new-session" class="btn btn-small">新建</button>
        <button type="button" id="btn-team-session" class="btn btn-small" title="需配置至少 2 条 team.models">团队</button>
      </div>
    </div>
    <div class="sidebar-session-toolbar">
      <label class="session-toolbar-field">
        <span class="session-toolbar-label">排序</span>
        <select id="session-sort" class="session-toolbar-select" aria-label="会话排序">
          <option value="updated_desc">最近更新</option>
          <option value="title_asc">标题 A-Z</option>
          <option value="title_desc">标题 Z-A</option>
          <option value="id_asc">会话 id</option>
        </select>
      </label>
      <label class="session-toolbar-field">
        <span class="session-toolbar-label">分组</span>
        <select id="session-group" class="session-toolbar-select" aria-label="会话分组">
          <option value="none">不分组</option>
          <option value="type">按类型</option>
          <option value="time">按更新时间</option>
        </select>
      </label>
    </div>
    <div id="sidebar-search" class="sidebar-search">
      <input
        type="search"
        id="session-search-input"
        class="session-search-input"
        placeholder="搜索会话全文…"
        aria-label="搜索会话全文"
        autocomplete="off"
      />
      <p id="session-search-empty" class="session-search-empty hidden" aria-live="polite">无匹配结果</p>
    </div>
    <ul id="session-search-results" class="session-list session-search-results hidden"></ul>
    <ul id="session-list" class="session-list"></ul>
    <p id="storage-hint" class="storage-hint"></p>
    <div class="sidebar-footer">
      <button type="button" id="btn-memory-save" class="btn btn-small">记住</button>
      <button type="button" id="btn-memory-view" class="btn btn-small">浏览记忆</button>
    </div>
  </aside>
  <div class="content">
    <header class="header">
      <div class="header-top">
        <h1 class="title">如意72</h1>
        <label class="theme-select-field">
          <span>主题色</span>
          <select id="theme-select" class="theme-select" aria-label="页面主题">
            <option value="default">默认（蓝灰）</option>
            <option value="emerald">翠绿</option>
            <option value="violet">紫罗兰</option>
            <option value="amber">琥珀</option>
          </select>
        </label>
      </div>
      <p id="settings-line" class="settings"></p>
    </header>
    <section class="session-bar">
      <label class="field">
        <span>工作区</span>
        <input type="text" id="workspace" class="field-input" placeholder="文件夹绝对路径，例如 C:\project\myrepo" />
        <button type="button" id="btn-apply-ws" class="btn btn-small">应用</button>
      </label>
      <p id="ws-apply-status" class="ws-apply-status" aria-live="polite"></p>
      <div class="mode-row">
        <span class="mode-label">模式</span>
        <label class="radio"><input type="radio" name="mode" value="chat" checked /> 对话（仅回答）</label>
        <label class="radio"><input type="radio" name="mode" value="react" /> ReAct（思考并执行）</label>
        <label class="radio"><input type="radio" name="mode" value="persona" /> 拟人（流式·可打断）</label>
        <label class="field react-steps">
          <span>ReAct 最大步数</span>
          <input type="number" id="react-steps" min="1" max="200" value="8" class="field-input narrow" />
        </label>
      </div>
    </section>
    <main class="main">
      <div id="messages" class="messages" aria-live="polite"></div>
      <form id="chat-form" class="composer">
        <textarea
          id="input"
          class="input"
          rows="3"
          placeholder="输入消息，Enter 发送，Shift+Enter 换行"
          autocomplete="off"
        ></textarea>
        <button type="button" id="btn-persona-interrupt" class="send btn-interrupt hidden" title="中断当前拟人回复">打断</button>
        <button type="submit" id="send" class="send">发送</button>
      </form>
      <div id="main-waiting" class="main-waiting hidden" aria-busy="true" aria-hidden="true">
        <div class="main-waiting-inner">
          <div class="spinner" aria-hidden="true"></div>
          <p id="main-waiting-text" class="main-waiting-text">请稍候…</p>
        </div>
      </div>
    </main>
  </div>

  <!-- 记住：输入弹窗 -->
  <div id="memory-modal-overlay" class="memory-modal-overlay hidden" aria-hidden="true">
    <div class="memory-modal" role="dialog" aria-labelledby="memory-modal-title">
      <h3 id="memory-modal-title" class="memory-modal-title">请输入我要记住的内容</h3>
      <p class="memory-modal-hint">可粘贴对话摘要或原文，确定后将由大模型提取事实、事件与关系并保存。</p>
      <textarea
        id="memory-input"
        class="memory-modal-textarea"
        rows="14"
        placeholder="在此输入或粘贴要记忆的内容…"
        autocomplete="off"
      ></textarea>
      <div class="memory-modal-actions">
        <button type="button" id="memory-cancel" class="btn">取消</button>
        <button type="button" id="memory-confirm" class="btn btn-primary">确定</button>
      </div>
    </div>
  </div>

  <!-- 全局加载（记住时转圈） -->
  <div id="global-loading" class="global-loading hidden" aria-busy="true" aria-hidden="true">
    <div class="global-loading-inner">
      <div class="spinner" aria-hidden="true"></div>
      <p id="global-loading-text" class="global-loading-text">请稍候…</p>
    </div>
  </div>

  <!-- 团队会话：选择人数 -->
  <div id="team-modal-overlay" class="memory-modal-overlay hidden" aria-hidden="true">
    <div class="memory-modal" role="dialog" aria-labelledby="team-modal-title">
      <h3 id="team-modal-title" class="memory-modal-title">创建团队会话</h3>
      <p class="memory-modal-hint">链式多模型：用户消息从 A1 进入，可委派至 A2…；末位收口。人数受配置中 team.models 条数与上限 4 约束。</p>
      <label class="team-modal-field">
        <span>Agent 人数 N（2～4，且不超过已配置模型数）</span>
        <select id="team-size-select" class="field-input"></select>
      </label>
      <div class="memory-modal-actions">
        <button type="button" id="team-cancel" class="btn">取消</button>
        <button type="button" id="team-confirm" class="btn btn-primary">创建</button>
      </div>
    </div>
  </div>

  <script>
    window.__ruyiPersonaEvent = function (jsonStr) {
      try {
        var evt = JSON.parse(jsonStr);
        if (typeof window.__ruyiPersonaDispatch === "function") {
          window.__ruyiPersonaDispatch(evt);
        }
      } catch (e) { /* ignore */ }
    };
  </script>
  <script src="app.js"></script>
</body>
</html>
