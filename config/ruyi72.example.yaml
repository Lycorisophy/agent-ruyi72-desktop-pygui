# 复制为项目根目录 ruyi72.yaml，或 ~/.ruyi72/ruyi72.yaml
# 也可用环境变量 RUYI72_CONFIG 指向配置文件路径
#
# 常用环境变量（与 YAML 互补）：
#   RUYI72_DEBUG=1          — 控制台 DEBUG 级 LLM 请求/响应摘要
#   RUYI72_LLM_LOG=1        — 控制台 INFO 每轮 LLM 单行摘要（与 llm.log_summary 类似）
#   RUYI72_REACT_TRACE=1    — ReAct 每次工具调用的名称与截断参数/结果（INFO）

version: 1

app:
  title: 如意72
  width: 960
  height: 640
  # true 时（或环境变量 RUYI72_DEBUG=1）控制台输出 LLM 请求/响应全文级摘要；可能含对话片段，勿在公共环境开启
  # debug: false

llm:
  # ollama | minimax | deepseek | qwen（后三者仅 OpenAI 兼容接口，需 api_key，见下方注释）
  provider: ollama
  base_url: http://127.0.0.1:11434
  model: qwen3.5:35b-a3b-q8_0-nothink
  temperature: 0.6
  max_tokens: 131072
  # native: /api/chat；openai: /v1/chat/completions（部分网关只转发 /v1）。云端 provider 会强制为 openai 模式。
  api_mode: openai
  # 本机 loopback 默认不走系统代理；仍 HTTP 502 时可显式设为 false
  # trust_env: false
  # true 或环境变量 RUYI72_LLM_LOG=1：终端 INFO 每轮 LLM 单行摘要（耗时、模型、URL、状态；不含全文 prompt）。与 app.debug 独立
  # log_summary: false
  # 本地默认可不填。远程 / Ollama Cloud / 需鉴权的反代：填写令牌，或设 OLLAMA_API_KEY
  # api_key: ""
  # 示例（勿与 ollama 同时生效；仅作参考）:
  # provider: deepseek
  # base_url: https://api.deepseek.com
  # model: deepseek-chat
  # api_key: "sk-..."
  # provider: qwen
  # base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  # model: qwen-turbo
  # api_key: "sk-..."   # 或环境变量 DASHSCOPE_API_KEY
  # provider: minimax
  # base_url: https://api.minimax.chat/v1
  # model: abab6.5s-chat
  # api_key: "..."

# 界面「保存并应用」写入 %USERPROFILE%\.ruyi72\ruyi72.local.yaml，仅 llm 块；会覆盖主配置中同名 llm 字段。

# 会话历史根目录；留空则为 %USERPROFILE%\.ruyi72\sessions\<sessionId>\
storage:
  sessions_root: ""

# 新建会话时 ReAct 默认最大步数
agent:
  react_max_steps_default: 8

# 拟人模式：流式输出、可打断；主动发言需显式开启
persona:
  stream_think: true
  proactive_enabled: false
  proactive_idle_seconds: 120
  proactive_max_per_day: 5

# 闲时自动从会话历史抽取记忆（默认关闭；游标见 ~/.ruyi72/memory_auto_extract_state.json）
# memory_auto_extract:
#   enabled: false
#   interval_sec: 180
#   max_chars_per_batch: 16000
#   min_chars_to_extract: 40
#   max_sessions_scanned: 30

# 长期记忆 v2：SQLite + FTS、向量、会话历史索引（见 docs 记忆系统设计 v2）
# embedding:
#   model: qwen3-embedding:8b
#   base_url: ""   # 空则沿用 llm.base_url（Ollama）
# memory:
#   backend: jsonl   # jsonl | dual | sqlite；dual/sqlite 时启动会尝试从 *.jsonl 一次性导入 memory.db
#   sqlite_path: "" # 空则为 %USERPROFILE%\.ruyi72\memory\memory.db
#   vector_enabled: false   # true 且 llm.provider=ollama 时，important 事实与事件写入后写入向量（事实/事件表见 memory.db）
#   vector_index_fictional_events: false  # 为 true 时也对 world_kind=fictional 的事件建 event_embeddings
#   bootstrap_planned_summary_enabled: true   # 冷启动是否单独展示「近期计划（摘要）」
#   bootstrap_planned_events_max: 3           # 近期计划条数上限 0～20；0 则与主事件区合并展示
#   messages_index_enabled: false  # true 时每次保存会话消息会重建该会话在 memory.db 的 FTS（供 search_history）
#   extract_llm_timeout_sec: 300  # 主动/闲时记忆抽取的 LLM 读超时（秒，60～3600）；大模型或长粘贴可调高如 600
#   extract_max_input_chars: 16000  # 单次抽取粘贴文本最大字符数；超出则拒绝（可分段提取或调大）
#   extract_max_tokens: 4096      # 抽取专用生成 token 上限，与 llm.max_tokens 独立，减轻慢推理与超长 JSON
#   bootstrap_exclude_fictional_events: true   # v3：会话冷启动注入（build_memory_bootstrap_block）是否从事件中排除 world_kind=fictional

# 内置会话级 + 全局定时任务调度（计划见 docs/scheduled-tasks-design.md）
# builtin_scheduler:
#   enabled: true
#   tick_interval_sec: 20
#   max_sessions_scanned: 50
#   max_tasks_per_tick: 3

# 上文压缩：检查点 context_checkpoint.json；不删 messages.json，仅影响喂给模型的视图（见 docs/module-design.md 第 15 节）
# context_compression:
#   enabled: false
#   context_token_budget: 32000      # 粗估 token 预算（len/4）
#   pre_send_threshold: 0.85         # 超过 budget * 此比例则尝试压缩
#   max_summary_chars: 8000
#   summary_max_tokens: 1024         # 摘要专用单次生成上限
#   max_message_chars_phase_a: 24000 # 阶段 A：单条过长时头尾截断
#   idle_compress_interval_sec: 0    # 0 表示禁用；与内置调度 tick 联动，空闲时尝试压一轮
#   post_reply_compress: false       # 安全模式每轮回复落盘后是否再尝试压缩

# 助手输出检查：引用链接、异步存疑、按节评审（sessions/<id>/output_annotations.json）
# output_review:
#   enabled: false
#   checker_model: ""               # 空则沿用 llm.model；可填较小模型以省资源
#   checker_max_tokens: 1024
#   checker_max_input_chars: 12000
#   checker_timeout_sec: 90
#   async_doubt_after_reply: false   # 为 true 时前端拉取后会排队异步存疑（后台线程）
#   show_section_buttons: true       # 解析出章节标题时显示「检查本节」
