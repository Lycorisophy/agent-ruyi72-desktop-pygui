# 如意 Agent 配置文件

app:
  name: "ruyi72"
  version: "1.0.0"
  environment: "development"

server:
  host: "127.0.0.1"
  port: 8765
  reload: false

ollama:
  base_url: "http://localhost:11434"
  model: "qwen3.5:35b-a3b-q8_0-nothink"
  timeout: 120
  temperature: 0.7
  max_tokens: 4096

agent:
  default_mode: "general"
  max_iterations: 50
  max_cycles: 30

sandbox:
  enabled: true
  max_execution_time: 30
  allowed_commands:
    - python
    - node
    - git
    - pip
    - npm
