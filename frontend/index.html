<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>如意 Agent - ruyi72</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <div class="app-container">
        <!-- 侧边栏 -->
        <nav class="sidebar">
            <div class="sidebar-item active" data-tab="chat" title="对话">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
                </svg>
            </div>
            <div class="sidebar-item" data-tab="skills" title="技能">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                </svg>
            </div>
            <div class="sidebar-item" data-tab="settings" title="设置">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
            </div>
        </nav>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 对话面板 -->
            <div id="chat-panel" class="tab-content active">
                <!-- 工具栏 -->
                <div class="toolbar">
                    <div class="mode-selector">
                        <button class="mode-btn active" data-mode="general">通用</button>
                        <button class="mode-btn" data-mode="plan">规划</button>
                        <button class="mode-btn" data-mode="verify">验证</button>
                        <button class="mode-btn" data-mode="explore">探索</button>
                        <button class="mode-btn" data-mode="guide">引导</button>
                    </div>
                    <div class="toolbar-actions">
                        <button class="btn btn-secondary" id="clear-btn">清空</button>
                    </div>
                </div>

                <!-- 聊天区 -->
                <div class="chat-area">
                    <div class="messages" id="messages">
                        <div class="message assistant">
                            <div class="message-role">如意</div>
                            <div class="message-content">你好！我是如意（ruyi72），你的智能助手。有什么我可以帮你的吗？</div>
                        </div>
                    </div>

                    <!-- 输入区 -->
                    <div class="input-area">
                        <input type="text" id="message-input" placeholder="输入消息... (Enter 发送)" autocomplete="off">
                        <button class="btn btn-primary" id="send-btn">发送</button>
                    </div>
                </div>

                <!-- 状态栏 -->
                <div class="status-bar">
                    <span class="status-indicator online" id="health-indicator"></span>
                    <span id="health-status">检查中...</span>
                </div>
            </div>

            <!-- 技能面板 -->
            <div id="skills-panel" class="tab-content">
                <h2>可用技能</h2>
                <p class="text-muted">点击技能查看详情和参数</p>
                <hr style="margin: 16px 0; border: none; border-top: 1px solid var(--border);">
                <div id="skills-list">
                    <p class="text-muted">加载中...</p>
                </div>
            </div>

            <!-- 设置面板 -->
            <div id="settings-panel" class="tab-content">
                <h2>设置</h2>
                <hr style="margin: 16px 0; border: none; border-top: 1px solid var(--border);">
                
                <div class="settings-section">
                    <h3>系统信息</h3>
                    <div id="system-info">
                        <p class="text-muted">加载中...</p>
                    </div>
                </div>

                <div class="settings-section">
                    <h3>关于</h3>
                    <p><strong>如意 Agent</strong> v1.0.0</p>
                    <p class="text-muted">基于 PyWebView + FastAPI + Ollama 的智能助手</p>
                </div>
            </div>
        </main>
    </div>

    <!-- 技能详情模态框 -->
    <div class="modal" id="skill-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="skill-modal-title">技能名称</h3>
                <p class="text-muted" id="skill-modal-desc">技能描述</p>
            </div>
            <div class="modal-body">
                <div id="skill-params">
                    <!-- 动态参数表单 -->
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="skill-cancel-btn">取消</button>
                <button class="btn btn-primary" id="skill-execute-btn">执行</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
